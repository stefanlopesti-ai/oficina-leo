<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OficinaAppSSJ — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#F5C400; --accent-dark:#D9AC00;
  --charcoal:#1A1A1A; --surface:#FFFFFF;
  --muted:#6B7280; --border:#E5E7EB; --text:#111827;
  --red:#EF4444; --red-bg:#FEE2E2;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--charcoal);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--text);-webkit-font-smoothing:antialiased;}
.box{background:var(--surface);border-radius:24px;padding:32px 26px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.35);}
.logo{text-align:center;margin-bottom:22px;}
.logo-icon{width:64px;height:64px;background:var(--accent);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:12px;}
.logo h1{font-size:1.3rem;font-weight:900;letter-spacing:-0.3px;}
.logo p{font-size:.82rem;color:var(--muted);margin-top:4px;}
.tabs{display:flex;gap:6px;background:#F4F5F7;padding:5px;border-radius:12px;margin-bottom:20px;}
.tab{flex:1;padding:11px;border:0;background:transparent;font:inherit;font-weight:700;font-size:.88rem;color:var(--muted);border-radius:9px;cursor:pointer;}
.tab.ativa{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.form-group label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.form-group input{padding:13px 14px;border:1.5px solid var(--border);border-radius:11px;font:inherit;font-size:.95rem;background:#fff;outline:none;transition:border-color .15s;}
.form-group input:focus{border-color:var(--accent);}
.btn{width:100%;padding:14px;border:0;border-radius:12px;background:var(--accent);color:#1A1A1A;font:inherit;font-weight:800;font-size:.98rem;cursor:pointer;transition:background .15s;}
.btn:hover{background:var(--accent-dark);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.erro{display:none;background:var(--red-bg);color:var(--red);padding:10px 12px;border-radius:10px;font-size:.85rem;margin-bottom:12px;font-weight:600;}
.erro.visivel{display:block;}
.foot{text-align:center;margin-top:18px;font-size:.72rem;color:var(--muted);}
</style>
</head>
<body>

<div class="box">
  <div class="logo">
    <div class="logo-icon">🔧</div>
    <h1>OficinaAppSSJ</h1>
    <p>Faça login para continuar</p>
  </div>

  <div class="tabs">
    <button class="tab ativa" id="tabCliente" onclick="trocarAba('cliente')">🙋 Cliente</button>
    <button class="tab" id="tabMecanico" onclick="trocarAba('mecanico')">🛠 Mecânico</button>
  </div>

  <div id="erro" class="erro"></div>

  <!-- CLIENTE -->
  <form id="formCliente" onsubmit="entrar(event,'cliente')">
    <div class="form-group">
      <label>CPF</label>
      <input id="cpfCliente" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required oninput="mascCPF(this)">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input id="senhaCliente" type="password" placeholder="Sua senha" required>
    </div>
    <button class="btn" id="btnCliente" type="submit">Entrar →</button>
  </form>

  <!-- MECÂNICO -->
  <form id="formMecanico" onsubmit="entrar(event,'mecanico')" style="display:none;">
    <div class="form-group">
      <label>Usuário</label>
      <input id="userMec" type="text" autocapitalize="off" autocomplete="username" placeholder="usuario.mecanico" required>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input id="senhaMec" type="password" placeholder="Sua senha" required>
    </div>
    <button class="btn" id="btnMec" type="submit">Entrar →</button>
  </form>

  <p class="foot">Sistema desenvolvido por Stefan Lopes de Aquino</p>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCjk3DJOo1UWPqAKvLQb_jT4ZB71iU9esSlf-R88H-qwU80BxafzQ_lDHZnt66bahm/exec';

function trocarAba(qual){
  document.getElementById('tabCliente').classList.toggle('ativa', qual==='cliente');
  document.getElementById('tabMecanico').classList.toggle('ativa', qual==='mecanico');
  document.getElementById('formCliente').style.display = qual==='cliente' ? 'block':'none';
  document.getElementById('formMecanico').style.display = qual==='mecanico' ? 'block':'none';
  esconderErro();
}

function mascCPF(el){
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if(v.length>9)      v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2}).*/,'$1.$2.$3-$4');
  else if(v.length>6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
  else if(v.length>3) v = v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
  el.value = v;
}

function mostrarErro(msg){
  const e = document.getElementById('erro');
  e.textContent = msg; e.classList.add('visivel');
}
function esconderErro(){ document.getElementById('erro').classList.remove('visivel'); }

async function api(body){
  const res = await fetch(SCRIPT_URL, {
    method:'POST',
    body: JSON.stringify(body),
    headers:{'Content-Type':'text/plain;charset=utf-8'}
  });
  return res.json();
}

async function entrar(ev, tipo){
  ev.preventDefault();
  esconderErro();

  let login, senha, btn;
  if(tipo==='cliente'){
    login = document.getElementById('cpfCliente').value.replace(/\D/g,'');
    senha = document.getElementById('senhaCliente').value;
    btn   = document.getElementById('btnCliente');
  } else {
    login = document.getElementById('userMec').value.trim();
    senha = document.getElementById('senhaMec').value;
    btn   = document.getElementById('btnMec');
  }

  btn.disabled = true;
  const textoOriginal = btn.textContent;
  btn.textContent = 'Buscando sua oficina...';

  try {
    // 1) Descobrir a oficina automaticamente
    const disc = await api({ acao:'descobrirOficina', tipo, login, senha });
    if (disc.erro || !disc.ok || !disc.oficinaId) {
      mostrarErro(disc.erro || 'Não conseguimos encontrar seu cadastro.');
      btn.disabled = false; btn.textContent = textoOriginal;
      return;
    }

    const oficinaId = disc.oficinaId;

    if (tipo === 'cliente') {
      // Salva sessão no formato que cliente.html espera
      const r = await api({ acao:'loginCliente', oficinaId, cpf: login, senha });
      if (r.erro || !r.ok) {
        mostrarErro(r.erro || 'Erro ao entrar.');
        btn.disabled = false; btn.textContent = textoOriginal;
        return;
      }
      if (r.precisaTrocarSenha) {
  // Não salva sessão ainda — deixa o cliente.html pedir a troca de senha
  // Salva só os dados mínimos para o cliente.html reconhecer o usuário
  sessionStorage.setItem('oficina_leo_primeiro_acesso_' + oficinaId, JSON.stringify({
    cliente: r.cliente,
    origemConfirmada: r.origemConfirmada,
    cpf: login,
    senhaAtual: senha
  }));
  window.location.href = 'cliente.html?oficinaId=' + encodeURIComponent(oficinaId) + '&primeiroAcesso=1';
} else {
  localStorage.setItem('oficina_leo_cliente_' + oficinaId, JSON.stringify({
    ...r.cliente,
    origemConfirmada: r.origemConfirmada,
    oficinaId
  }));
  window.location.href = 'cliente.html?oficinaId=' + encodeURIComponent(oficinaId);
}
    } else {
      const r = await api({ acao:'loginMecanico', oficinaId, usuario: login, senha });
      if (r.erro || !r.ok) {
        mostrarErro(r.erro || 'Erro ao entrar.');
        btn.disabled = false; btn.textContent = textoOriginal;
        return;
      }
      localStorage.setItem('oficina_leo_oficina_id', oficinaId);
      localStorage.setItem('oleo_mecanico_' + oficinaId, JSON.stringify({
        ...r.mecanico,
        oficinaNome: r.oficinaNome,
        plano: r.plano,
        oficinaId
      }));
      window.location.href = 'oficina.html?oficinaId=' + encodeURIComponent(oficinaId);
    }
  } catch(err) {
    mostrarErro('Erro de conexão. Tente novamente.');
    btn.disabled = false; btn.textContent = textoOriginal;
  }
}
</script>
</body>
</html>
